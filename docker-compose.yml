version: "3.9"

services:
  # ─────────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_resume_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - RATELIMIT_PER_MINUTE=${RATELIMIT_PER_MINUTE:-20}
    volumes:
      - ./backend:/app
      # Mount a volume for HuggingFace model cache so models aren't re-downloaded
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai_resume_network

  # ─────────────────────────────────────────
  # Frontend — Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_resume_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai_resume_network

  # ─────────────────────────────────────────
  # Redis — Optional caching / rate limiting
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_resume_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_resume_network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  huggingface_cache:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  ai_resume_network:
    driver: bridge
